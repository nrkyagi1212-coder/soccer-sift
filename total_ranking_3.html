<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大隈杯 総合得点</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:13px;background:#f4f5f7;color:#111}
header{background:#111827;color:#fff;padding:12px 16px;font-size:16px;font-weight:700;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.dot{width:8px;height:8px;border-radius:50%;background:#6b7280;display:inline-block;margin-right:4px}
.dot.ok{background:#4ade80}.dot.wait{background:#facc15;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:#fff;border-bottom:2px solid #111827;position:sticky;top:48px;z-index:99}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:#888;border:none;background:none;cursor:pointer}
.tab.on{color:#111827;border-bottom:3px solid #111827;margin-bottom:-2px}
.page{display:none;padding:10px}.page.on{display:block}

/* 得点表テーブル */
.score-section{margin-bottom:14px}
.grade-header{font-size:13px;font-weight:800;padding:6px 10px;border-radius:8px 8px 0 0;color:#fff;margin-bottom:0}
.g4h{background:#185FA5}.g5h{background:#1D9E75}.g6h{background:#BA7517}
.score-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.st{border-collapse:collapse;font-size:11px;min-width:100%}
table.st th{padding:5px 6px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid #ddd}
table.st td{padding:5px 6px;text-align:center;border:1px solid #ddd;white-space:nowrap}
.th-sport{background:#444;color:#fff;text-align:left!important;min-width:80px}
.th-cls{background:#E8F4FD;color:#0C447C;font-weight:800;font-size:12px}
.td-rank{color:#888;font-size:10px;min-width:20px}
.td-pts{font-weight:700;font-size:12px;min-width:28px}
.td-blank{color:#ccc;font-size:10px}
tr.tr-subtotal td{background:#F3F4F6;font-weight:700;border-top:2px solid #aaa}
tr.tr-total td{background:#111827;color:#fff;font-weight:800;font-size:13px;border-top:2px solid #111827}
.pts-gold{color:#D97706;font-weight:800}
.pts-silver{color:#6B7280;font-weight:800}
.pts-bronze{color:#CD7C54;font-weight:800}

/* 学年別 */
.grade-card{border-radius:10px;padding:12px;margin-bottom:10px}
.g4c{background:#EEF6FF;border-left:4px solid #185FA5}
.g5c{background:#EDFBF3;border-left:4px solid #1D9E75}
.g6c{background:#FFF7ED;border-left:4px solid #BA7517}
.grade-title{font-weight:800;font-size:14px;margin-bottom:8px}
.cls-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.07)}
.cls-name{font-weight:700;font-size:15px}
.cls-total{font-weight:800;font-size:18px}
.cls-detail{font-size:10px;color:#888;margin-top:2px}
.sp-badge{display:inline-block;padding:1px 5px;border-radius:6px;font-size:10px;font-weight:700;margin:1px}
.sp-s{background:#E6F1FB;color:#0C447C}.sp-b{background:#FAECE7;color:#712B13}
.sp-db{background:#EDFBF3;color:#085041}.sp-dbee{background:#EEEDFE;color:#3C3489}
.sp-h{background:#FAEEDA;color:#633806}
.info{background:#F3F4F6;color:#374151;border-radius:8px;padding:8px 12px;font-size:11px;margin-bottom:8px}
.auto-tag{font-size:10px;color:#1D9E75;font-weight:600;margin-left:4px}
</style>
</head>
<body>
<header>
  🏆 大隈杯 総合得点
  <span style="font-size:11px;font-weight:400"><span class="dot" id="dot"></span><span id="sstat">接続中...</span></span>
</header>
<div class="tabs">
  <button class="tab on" onclick="showTab('table',this)">得点表</button>
  <button class="tab" onclick="showTab('grade',this)">学年別</button>
</div>
<div id="pg-table" class="page on"></div>
<div id="pg-grade" class="page"></div>

var BLK_FINALS={

  },

    a:{teams:['4E','4F','5C','6A'],matches:[{id:'a1',h:'4E',a:'4F'},{id:'a2',h:'5C',a:'6A'},{id:'a3',h:'4E',a:'5C'},{id:'a4',h:'4F',a:'6A'},{id:'a5',h:'4E',a:'6A'},{id:'a6',h:'4F',a:'5C'}]},
    b:{teams:['4A','5B','6C','6F'],matches:[{id:'b1',h:'4A',a:'5B'},{id:'b2',h:'6C',a:'6F'},{id:'b3',h:'4A',a:'6C'},{id:'b4',h:'5B',a:'6F'},{id:'b5',h:'4A',a:'6F'},{id:'b6',h:'5B',a:'6C'}]},
    c:{teams:['4C','5D','6E','6G'],matches:[{id:'c1',h:'4C',a:'5D'},{id:'c2',h:'6E',a:'6G'},{id:'c3',h:'4C',a:'6E'},{id:'c4',h:'5D',a:'6G'},{id:'c5',h:'4C',a:'6G'},{id:'c6',h:'5D',a:'6E'}]},
    d:{teams:['4D','5A','5G','6B'],matches:[{id:'d1',h:'4D',a:'5A'},{id:'d2',h:'5G',a:'6B'},{id:'d3',h:'4D',a:'5G'},{id:'d4',h:'5A',a:'6B'},{id:'d5',h:'4D',a:'6B'},{id:'d6',h:'5A',a:'5G'}]},
    e:{teams:['4B','4G','5E','5F','6D'],matches:[{id:'e1',h:'4B',a:'4G'},{id:'e2',h:'5E',a:'5F'},{id:'e3',h:'4B',a:'6D'},{id:'e4',h:'4G',a:'5E'},{id:'e5',h:'5F',a:'6D'},{id:'e6',h:'4B',a:'5E'},{id:'e7',h:'4G',a:'5F'},{id:'e8',h:'5E',a:'6D'},{id:'e9',h:'4B',a:'5F'},{id:'e10',h:'4G',a:'6D'}]}
  },
  dodgeball:{
    a:{teams:['4A','5C','6B','6D'],matches:[{id:'a1',h:'4A',a:'5C'},{id:'a2',h:'6B',a:'6D'},{id:'a3',h:'4A',a:'6B'},{id:'a4',h:'5C',a:'6D'},{id:'a5',h:'4A',a:'6D'},{id:'a6',h:'5C',a:'6B'}]},
    b:{teams:['4G','5E','5F','6C'],matches:[{id:'b1',h:'4G',a:'5E'},{id:'b2',h:'5F',a:'6C'},{id:'b3',h:'4G',a:'5F'},{id:'b4',h:'5E',a:'6C'},{id:'b5',h:'4G',a:'6C'},{id:'b6',h:'5E',a:'5F'}]},
    c:{teams:['4C','4E','5A','5D'],matches:[{id:'c1',h:'4C',a:'4E'},{id:'c2',h:'5A',a:'5D'},{id:'c3',h:'4C',a:'5A'},{id:'c4',h:'4E',a:'5D'},{id:'c5',h:'4C',a:'5D'},{id:'c6',h:'4E',a:'5A'}]},
    d:{teams:['4B','4F','6E','6G'],matches:[{id:'d1',h:'4B',a:'4F'},{id:'d2',h:'6E',a:'6G'},{id:'d3',h:'4B',a:'6E'},{id:'d4',h:'4F',a:'6G'},{id:'d5',h:'4B',a:'6G'},{id:'d6',h:'4F',a:'6E'}]},
    e:{teams:['4D','5B','5G','6A','6F'],matches:[{id:'e1',h:'4D',a:'5B'},{id:'e2',h:'5G',a:'6A'},{id:'e3',h:'4D',a:'6F'},{id:'e4',h:'5B',a:'5G'},{id:'e5',h:'6A',a:'6F'},{id:'e6',h:'4D',a:'5G'},{id:'e7',h:'5B',a:'6A'},{id:'e8',h:'5G',a:'6F'},{id:'e9',h:'4D',a:'6A'},{id:'e10',h:'5B',a:'6F'}]}
  },
  dodgebee:{
    a:{teams:['4B','4C','5E','6D'],matches:[{id:'a1',h:'4B',a:'4C'},{id:'a2',h:'5E',a:'6D'},{id:'a3',h:'4B',a:'5E'},{id:'a4',h:'4C',a:'6D'},{id:'a5',h:'4B',a:'6D'},{id:'a6',h:'4C',a:'5E'}]},
    b:{teams:['4E','4G','5F','6A'],matches:[{id:'b1',h:'4E',a:'4G'},{id:'b2',h:'5F',a:'6A'},{id:'b3',h:'4E',a:'5F'},{id:'b4',h:'4G',a:'6A'},{id:'b5',h:'4E',a:'6A'},{id:'b6',h:'4G',a:'5F'}]},
    c:{teams:['4A','5B','5D','6G'],matches:[{id:'c1',h:'4A',a:'5B'},{id:'c2',h:'5D',a:'6G'},{id:'c3',h:'4A',a:'5D'},{id:'c4',h:'5B',a:'6G'},{id:'c5',h:'4A',a:'6G'},{id:'c6',h:'5B',a:'5D'}]},
    d:{teams:['4F','5A','6B','6C'],matches:[{id:'d1',h:'4F',a:'5A'},{id:'d2',h:'6B',a:'6C'},{id:'d3',h:'4F',a:'6B'},{id:'d4',h:'5A',a:'6C'},{id:'d5',h:'4F',a:'6C'},{id:'d6',h:'5A',a:'6B'}]},
    e:{teams:['4D','5C','5G','6E','6F'],matches:[{id:'e1',h:'4D',a:'5C'},{id:'e2',h:'5G',a:'6E'},{id:'e3',h:'4D',a:'6F'},{id:'e4',h:'5C',a:'5G'},{id:'e5',h:'6E',a:'6F'},{id:'e6',h:'4D',a:'5G'},{id:'e7',h:'5C',a:'6E'},{id:'e8',h:'5G',a:'6F'},{id:'e9',h:'4D',a:'6E'},{id:'e10',h:'5C',a:'6F'}]}
  },
  handball:{
    a:{teams:['4A','4G','5C','6F'],matches:[{id:'a1',h:'4A',a:'4G'},{id:'a2',h:'5C',a:'6F'},{id:'a3',h:'4A',a:'5C'},{id:'a4',h:'4G',a:'6F'},{id:'a5',h:'4A',a:'6F'},{id:'a6',h:'4G',a:'5C'}]},
    b:{teams:['4F','5E','6D','6G'],matches:[{id:'b1',h:'4F',a:'5E'},{id:'b2',h:'6D',a:'6G'},{id:'b3',h:'4F',a:'6D'},{id:'b4',h:'5E',a:'6G'},{id:'b5',h:'4F',a:'6G'},{id:'b6',h:'5E',a:'6D'}]},
    c:{teams:['4B','4C','5F','6A'],matches:[{id:'c1',h:'4B',a:'4C'},{id:'c2',h:'5F',a:'6A'},{id:'c3',h:'4B',a:'5F'},{id:'c4',h:'4C',a:'6A'},{id:'c5',h:'4B',a:'6A'},{id:'c6',h:'4C',a:'5F'}]},
    d:{teams:['5D','5G','6B','6E'],matches:[{id:'d1',h:'5D',a:'5G'},{id:'d2',h:'6B',a:'6E'},{id:'d3',h:'5D',a:'6B'},{id:'d4',h:'5G',a:'6E'},{id:'d5',h:'5D',a:'6E'},{id:'d6',h:'5G',a:'6B'}]},
    e:{teams:['4D','4E','5A','5B','6C'],matches:[{id:'e1',h:'4D',a:'4E'},{id:'e2',h:'5A',a:'5B'},{id:'e3',h:'4D',a:'6C'},{id:'e4',h:'4E',a:'5A'},{id:'e5',h:'5B',a:'6C'},{id:'e6',h:'4D',a:'5A'},{id:'e7',h:'4E',a:'5B'},{id:'e8',h:'5A',a:'6C'},{id:'e9',h:'4D',a:'5B'},{id:'e10',h:'4E',a:'6C'}]}
  }
};

var fbData={};
SPORTS.forEach(function(s){fbData[s]={scores:{},winners:{}};});
var loaded=0;
setStat('wait','接続中...');
SPORTS.forEach(function(sport){
  db.ref(sport).on('value',function(snap){
    var d=snap.val()||{};
    fbData[sport].scores=d.scores||{};
    fbData[sport].winners=d.winners||{};
    loaded++;
    if(loaded>=SPORTS.length){setStat('ok','同期中');renderAll();}
    else if(loaded>SPORTS.length) renderAll();
  });
});

function calcRankings(sport){
  var groups=SPORT_GROUPS[sport],scores=fbData[sport].scores,rankings={};
  for(var g in groups){
    var gd=groups[g],st={};
    gd.teams.forEach(function(t){st[t]={pts:0,gd:0,gf:0};});
    gd.matches.forEach(function(m){
      var s=scores[m.id];if(!s||s.h==null||s.a==null)return;
      var h=+s.h,a=+s.a;
      st[m.h].gf+=h;st[m.a].gf+=a;st[m.h].gd+=h-a;st[m.a].gd+=a-h;
      if(h>a)st[m.h].pts+=3;else if(h<a)st[m.a].pts+=3;else{st[m.h].pts++;st[m.a].pts++;}
    });
    rankings[g]=gd.teams.slice().sort(function(a,b){return st[b].pts-st[a].pts||st[b].gd-st[a].gd||st[b].gf-st[a].gf;});
  }
  return rankings;
}

function calcSportPts(sport){
  var winners=fbData[sport].winners,rankings=calcRankings(sport);
  var clsPts={},clsRank={};
  var allCls=[];
  for(var g in SPORT_GROUPS[sport]) SPORT_GROUPS[sport][g].teams.forEach(function(t){if(allCls.indexOf(t)<0)allCls.push(t);});
  allCls.forEach(function(c){clsPts[c]=null;clsRank[c]=null;});

  function getTeams(mid){
    var srcs=TM_SRC[mid]||[],wrefs=TM_WREF[mid]||[],teams=[];
    for(var i=0;i<2;i++){
      var src=srcs[i],wref=wrefs[i];
      if(src&&src[0]){var r=rankings[src[0]];teams.push(r&&r[src[1]-1]||'');}
      else if(wref&&winners[wref])teams.push(winners[wref]);
      else teams.push('');
    }
    return teams;
  }
  function getLoser(mid){
    var win=winners[mid];if(!win)return null;
    var t=getTeams(mid);
    if(t[0]===win)return t[1]||null;
    if(t[1]===win)return t[0]||null;
    return null;
  }

  for(var blk in BLK_FINALS){
    var bf=BLK_FINALS[blk],bpts=BLK_PTS[blk];
    var fw=winners[bf.final],fl=getLoser(bf.final);
    if(fw&&clsPts[fw]===null){clsPts[fw]=bpts[1];clsRank[fw]=blk+'1';}
    if(fl&&clsPts[fl]===null){clsPts[fl]=bpts[2];clsRank[fl]=blk+'2';}
    bf.semi.forEach(function(mid){
      var lose=getLoser(mid);
      if(lose&&clsPts[lose]===null){clsPts[lose]=bpts.other;clsRank[lose]=blk+'3';}
    });
    bf.first.forEach(function(mid){
      var lose=getLoser(mid);
      if(lose&&clsPts[lose]===null){clsPts[lose]=bpts.other;clsRank[lose]=blk+'5';}
    });
  }
  return {pts:clsPts,rank:clsRank};
}

function calcAll(){
  var result={};
  GRADES.forEach(function(yr){
    CLSS.forEach(function(cls){
      var key=yr+cls;
      result[key]={total:0,sports:{}};
      SPORTS.forEach(function(sport){
        result[key].sports[sport]={pts:null,rank:null};
      });
    });
  });
  SPORTS.forEach(function(sport){
    var data=calcSportPts(sport);
    for(var cls in data.pts){
      if(result[cls]){
        result[cls].sports[sport]={pts:data.pts[cls],rank:data.rank[cls]};
        if(data.pts[cls]>0) result[cls].total+=data.pts[cls];
      }
    }
  });
  return result;
}

function renderAll(){
  var data=calcAll();
  renderTable(data);
  renderGrade(data);
}

// 得点表（学年ごとに横並び表）
function renderTable(data){
  var html='<div class="info">各競技のトーナメント結果から自動計算<span class="auto-tag">● 自動</span></div>';

  GRADES.forEach(function(yr){
    var grpCls='g'+yr+'h';
    var clsList=CLSS.map(function(c){return yr+c;});
    html+='<div class="score-section">';
    html+='<div class="grade-header '+grpCls+'">'+yr+'年生</div>';
    html+='<div class="score-wrap"><table class="st">';

    // ヘッダー行（クラス名）
    html+='<tr><th class="th-sport">競技</th>';
    clsList.forEach(function(cls){
      html+='<th colspan="2" class="th-cls">'+cls+'</th>';
    });
    html+='</tr>';

    // 小見出し（順位/得点）
    html+='<tr><th class="th-sport"></th>';
    clsList.forEach(function(){
      html+='<th style="background:#f0f0f0;color:#666;font-size:10px">順位</th>';
      html+='<th style="background:#f0f0f0;color:#333;font-size:10px">得点</th>';
    });
    html+='</tr>';

    // 各競技の行
    SPORTS.forEach(function(sport){
      html+='<tr><td class="th-sport" style="color:#fff;background:#444;text-align:left;padding:4px 6px">'+SPORT_NAMES[sport]+'</td>';
      clsList.forEach(function(cls){
        var sp=data[cls].sports[sport];
        var rank=sp.rank||'';
        var pts=sp.pts;
        if(pts!==null&&pts>0){
          html+='<td class="td-rank">'+rank+'</td>';
          html+='<td class="td-pts">'+pts+'</td>';
        } else {
          html+='<td class="td-blank">—</td><td class="td-blank">—</td>';
        }
      });
      html+='</tr>';
    });

    // 小計行
    html+='<tr class="tr-subtotal"><td style="text-align:left;padding:4px 6px">小計</td>';
    clsList.forEach(function(cls){
      var t=data[cls].total;
      html+='<td></td><td>'+(t>0?t:'—')+'</td>';
    });
    html+='</tr>';

    // 合計行（学年合計）
    var grTotal=clsList.reduce(function(s,c){return s+data[c].total;},0);
    html+='<tr class="tr-total"><td style="text-align:left;padding:6px">合計</td>';
    html+='<td colspan="'+(clsList.length*2)+'">'+grTotal+'</td>';
    html+='</tr>';

    html+='</table></div></div>';
  });

  // 7クラス合計（A〜G組の4年+5年+6年の合計）
  var clsGroups={};
  CLSS.forEach(function(cls){
    clsGroups[cls]=0;
    GRADES.forEach(function(yr){
      clsGroups[cls]+=data[yr+cls].total||0;
    });
  });
  var sortedCls=CLSS.slice().sort(function(a,b){return clsGroups[b]-clsGroups[a];});
  var medals=['🥇','🥈','🥉'];

  html+='<div class="score-section">';
  html+='<div class="grade-header" style="background:#111827">🏆 組別 総合得点ランキング（4・5・6年合計）</div>';
  html+='<div class="score-wrap"><table class="st">';
  html+='<tr>';
  html+='<th style="background:#111827;color:#fff;font-size:12px">順位</th>';
  html+='<th style="background:#111827;color:#fff;font-size:12px">組</th>';
  html+='<th style="background:#111827;color:#fff;font-size:12px">合計得点</th>';
  html+='<th style="background:#185FA5;color:#fff;font-size:10px">4年</th>';
  html+='<th style="background:#1D9E75;color:#fff;font-size:10px">5年</th>';
  html+='<th style="background:#BA7517;color:#fff;font-size:10px">6年</th>';
  html+='</tr>';

  var prevPts2=-1,dispRank2=0,cnt2=0;
  sortedCls.forEach(function(cls){
    cnt2++;
    var total=clsGroups[cls];
    if(total!==prevPts2){dispRank2=cnt2;prevPts2=total;}
    var medal=dispRank2<=3?medals[dispRank2-1]:dispRank2;
    var rowBg=dispRank2===1?'#FFFBEB':dispRank2===2?'#F5F5F5':dispRank2===3?'#FFF3EE':'#fff';
    html+='<tr style="background:'+rowBg+'">';
    html+='<td style="font-weight:700;font-size:16px;text-align:center">'+medal+'</td>';
    html+='<td style="font-weight:800;font-size:18px;text-align:center">'+cls+'組</td>';
    html+='<td style="font-weight:800;font-size:20px;color:#111827;text-align:center">'+(total>0?total:'—')+'</td>';
    GRADES.forEach(function(yr){
      var t=data[yr+cls].total;
      html+='<td style="font-size:12px;text-align:center;color:#555">'+(t>0?t:'—')+'</td>';
    });
    html+='</tr>';
  });
  html+='</table></div></div>';

  document.getElementById('pg-table').innerHTML=html;
}

// 学年別順位
function renderGrade(data){
  var html='<div class="info">学年ごとに合計得点でソート<span class="auto-tag">● 自動</span></div>';
  GRADES.forEach(function(yr){
    var clsList=CLSS.map(function(c){return yr+c;});
    clsList.sort(function(a,b){return data[b].total-data[a].total;});
    var gc=yr===4?'g4c':yr===5?'g5c':'g6c';
    html+='<div class="grade-card '+gc+'">';
    html+='<div class="grade-title">'+yr+'年生</div>';
    clsList.forEach(function(cls,i){
      var t=data[cls].total;
      var details=SPORTS.map(function(s){
        var sp=data[cls].sports[s];
        return sp.pts?'<span class="sp-badge '+SPORT_BADGE[s]+'">'+sp.pts+'</span>':'';
      }).join('');
      html+='<div class="cls-row">';
      html+='<div><div class="cls-name">'+(i+1)+'位　'+cls+'</div><div class="cls-detail">'+details+'</div></div>';
      html+='<div class="cls-total">'+(t>0?t+'点':'—')+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('pg-grade').innerHTML=html;
}

function showTab(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
}
</script>
</body>
</html>
