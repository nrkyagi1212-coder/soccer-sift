<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤾 ハンドボール審判シフト</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:14px;background:#f4f5f7;color:#111}
header{background:#444441;color:#fff;padding:12px 16px;font-size:16px;font-weight:700;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sync-dot.ok{background:#4ade80}.sync-dot.wait{background:#facc15;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.readonly-banner{background:#F59E0B;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:700;display:none}
.readonly-banner.on{display:block}
.tabs{display:flex;background:#fff;border-bottom:2px solid #444441;overflow-x:auto;position:sticky;top:48px;z-index:99}
.tab{flex:1;min-width:55px;padding:9px 2px;text-align:center;font-size:10px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap}
.tab.on{color:#444441;border-bottom:2px solid #444441;margin-bottom:-2px}
.page{display:none;padding:12px}.page.on{display:block}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#444;color:#fff;padding:6px 4px;text-align:center;font-size:11px}
td{padding:6px 4px;border-bottom:1px solid #eee;text-align:center}
td.tl{text-align:left}
input[type=number]{width:44px;padding:4px 2px;text-align:center;border:2px solid #FFDD00;border-radius:6px;font-size:15px;font-weight:700;background:#FFFFF0}
input[type=number]:focus{outline:none;border-color:#444441}
input[type=number]:disabled{background:#f0f0f0;border-color:#ddd;color:#aaa}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.r1{background:#E6F1FB;color:#0C447C}.r2{background:#EAF3DE;color:#27500A}
.r3{background:#FAEEDA;color:#633806}.r4{background:#FAECE7;color:#712B13}.r5{background:#F1EFE8;color:#444}
.grp-a{background:#185FA5;color:#fff}.grp-b{background:#1D9E75;color:#fff}
.grp-c{background:#993C1D;color:#fff}.grp-d{background:#534AB7;color:#fff}.grp-e{background:#444441;color:#fff}
.blk-W{background:#E6F1FB;color:#0C447C}.blk-X{background:#E1F5EE;color:#085041}
.blk-Y{background:#FAECE7;color:#712B13}.blk-Z{background:#EEEDFE;color:#3C3489}
.shift-row{border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid #e8e8e8;background:#fff}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.role-box{border-radius:6px;padding:4px 7px;font-size:11px}
.role-lbl{font-size:10px;opacity:.7;margin-bottom:1px}
.role-name{font-weight:700;font-size:12px}
.honbu-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;padding-top:6px;border-top:1px solid #eee}
.ref-box{background:#E6F1FB;color:#0C447C}.bb-box{background:#E1F5EE;color:#085041}
.hb-box{background:#FAEEDA;color:#633806}.pk-box{background:#FBEAF0;color:#72243E}
.ng-box{background:#FCEBEB;color:#A32D2D}
.info{background:#F3F4F6;color:#374151;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:8px;line-height:1.6}
.winner-input{width:72px;padding:4px 6px;border:2px solid #FFDD00;border-radius:6px;font-size:13px;font-weight:700;text-align:center;background:#FFFFF0}
.winner-input:disabled{background:#f0f0f0;border-color:#ddd;color:#aaa}
.auto-tag{font-size:10px;color:#1D9E75;font-weight:600;margin-left:4px}
.rank-gold{background:#FFF9E6;border-left:4px solid #F59E0B}
.rank-silver{background:#F5F5F5;border-left:4px solid #9CA3AF}
.rank-bronze{background:#FFF3EE;border-left:4px solid #CD7C54}
.rank-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:5px}
.rank-num{font-size:20px;font-weight:800;min-width:36px;text-align:center}
.rank-cls{font-size:18px;font-weight:700}
.rank-pts{font-size:14px;font-weight:600;color:#444441;margin-left:auto}
.rank-detail{font-size:11px;color:#888}
.pts-table{width:100%;font-size:12px;border-collapse:collapse;margin-top:6px}
.pts-table th{background:#444;color:#fff;padding:5px;text-align:center;font-size:11px}
.pts-table td{padding:5px;border-bottom:1px solid #eee;text-align:center}
/* 総当たり表 */
.matrix th{background:#333;color:#fff;font-size:10px;padding:4px}
.matrix td{font-size:11px;padding:4px;min-width:36px}
.matrix .cls-h{background:#f0f0f0;font-weight:700;font-size:11px}
.matrix .win{background:#D1FAE5;color:#065F46;font-weight:700}
.matrix .lose{background:#FEE2E2;color:#991B1B;font-weight:700}
.matrix .draw{background:#FEF9C3;color:#854D0E;font-weight:700}
.matrix .self{background:#e5e7eb}
.matrix .blank{color:#ccc}
/* タブ切り替え（グループ内） */
.sub-tabs{display:flex;gap:4px;margin-bottom:10px;overflow-x:auto}
.sub-tab{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:#eee;color:#666;white-space:nowrap}
.sub-tab.on{background:#185FA5;color:#fff}
/* 時間割順入力 */
.match-card{background:#fff;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.match-header{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #eee}
.match-time{font-size:11px;color:#888;flex-shrink:0}
.match-grp{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-body{display:flex;align-items:center;padding:10px 12px;gap:8px}
.match-team{font-weight:700;font-size:15px;flex:1;text-align:center}
.match-vs{color:#aaa;font-size:12px}
.match-score{display:flex;align-items:center;gap:6px}
.score-disp{font-size:16px;font-weight:800;min-width:30px;text-align:center;padding:4px 8px;border-radius:6px;background:#f9f9f9;border:1px solid #eee}
</style>
</head>
<body>
<header>
  🤾 ハンドボール審判シフト
  <span id="reset-area" style="margin-right:6px"></span><span style="font-size:11px;font-weight:400"><span class="sync-dot" id="dot"></span><span id="sstat">接続中...</span></span>
</header>
<div class="readonly-banner" id="ro-banner">👁 閲覧専用モード — 得点・勝者の変更はできません</div>
<div class="tabs">
  <button class="tab on" onclick="showTab('group',this)">得点入力</button>
  <button class="tab" onclick="showTab('matrix',this)">総当たり表</button>
  <button class="tab" onclick="showTab('rank',this)">順位表</button>
  <button class="tab" onclick="showTab('tour',this)">トーナメント</button>
  <button class="tab" onclick="showTab('shift',this)">審判シフト</button>
  <button class="tab" onclick="showTab('total',this)">総合順位</button>
</div>
<div id="pg-group"  class="page on"></div>
<div id="pg-matrix" class="page"></div>
<div id="pg-rank"   class="page"></div>
<div id="pg-tour"   class="page"></div>
<div id="pg-shift"  class="page"></div>
<div id="pg-total"  class="page"></div>

<script>
firebase.initializeApp({databaseURL:'https://taizitu-sift-default-rtdb.firebaseio.com'});
var db=firebase.database();

// ===== 閲覧専用判定 =====
// URLに ?view を付けると閲覧専用モードになる
var READ_ONLY = location.search.indexOf('view') !== -1;
if(READ_ONLY){
  document.getElementById('ro-banner').classList.add('on');
  document.querySelector('header').style.background='#374151';
  document.title='👁 '+document.title+' (閲覧専用)';
}

function setStat(s,m){
  document.getElementById('dot').className='sync-dot'+(s?' '+s:'');
  document.getElementById('sstat').textContent=m;
}

var ALL_STAFF=[
  {cls:'5A',name:'松下和真'},{cls:'5D',name:'須田尚樹'},{cls:'5G',name:'砺波祐介'},
  {cls:'5A',name:'村山隼人'},
  {cls:'4C',name:'植草應太'},{cls:'4A',name:'野口統麻'},{cls:'4C',name:'蔡子然'},
  {cls:'4F',name:'古谷碧一'}
];
var GROUPS={
  a:{name:'aグループ',cls:'grp-a',teams:['4A','4G','5C','6F'],
     matches:[{id:'a1',h:'4A',a:'4G'},{id:'a2',h:'5C',a:'6F'},{id:'a3',h:'4A',a:'5C'},
              {id:'a4',h:'4G',a:'6F'},{id:'a5',h:'4A',a:'6F'},{id:'a6',h:'4G',a:'5C'}]},
  b:{name:'bグループ',cls:'grp-b',teams:['4F','5E','6D','6G'],
     matches:[{id:'b1',h:'4F',a:'5E'},{id:'b2',h:'6D',a:'6G'},{id:'b3',h:'4F',a:'6D'},
              {id:'b4',h:'5E',a:'6G'},{id:'b5',h:'4F',a:'6G'},{id:'b6',h:'5E',a:'6D'}]},
  c:{name:'cグループ',cls:'grp-c',teams:['4B','4C','5F','6A'],
     matches:[{id:'c1',h:'4B',a:'4C'},{id:'c2',h:'5F',a:'6A'},{id:'c3',h:'4B',a:'5F'},
              {id:'c4',h:'4C',a:'6A'},{id:'c5',h:'4B',a:'6A'},{id:'c6',h:'4C',a:'5F'}]},
  d:{name:'dグループ',cls:'grp-d',teams:['5D','5G','6B','6E'],
     matches:[{id:'d1',h:'5D',a:'5G'},{id:'d2',h:'6B',a:'6E'},{id:'d3',h:'5D',a:'6B'},
              {id:'d4',h:'5G',a:'6E'},{id:'d5',h:'5D',a:'6E'},{id:'d6',h:'5G',a:'6B'}]},
  e:{name:'eグループ',cls:'grp-e',teams:['4D','4E','5A','5B','6C'],
     matches:[{id:'e1',h:'4D',a:'4E'},{id:'e2',h:'5A',a:'5B'},{id:'e3',h:'4D',a:'6C'},
              {id:'e4',h:'4E',a:'5A'},{id:'e5',h:'5B',a:'6C'},{id:'e6',h:'4D',a:'5A'},
              {id:'e7',h:'4E',a:'5B'},{id:'e8',h:'5A',a:'6C'},{id:'e9',h:'4D',a:'5B'},
              {id:'e10',h:'4E',a:'6C'}]}
};

// 時間割（グループ戦）- 試合IDと時間の対応
var GROUP_SCHED=[
  {time:'9:00~9:06',  matches:['e1','e2']},
  {time:'9:08~9:14',  matches:['a1','a2']},
  {time:'9:16~9:22',  matches:['b1','b2']},
  {time:'9:24~9:30',  matches:['c1','c2']},
  {time:'9:32~9:38',  matches:['d1','d2']},
  {time:'9:40~9:46',  matches:['e3','e4']},
  {time:'9:48~9:54',  matches:['a3','a4']},
  {time:'9:56~10:02', matches:['b3','b4']},
  {time:'10:04~10:10',matches:['c3','c4']},
  {time:'10:12~10:18',matches:['d3','d4']},
  {time:'10:20~10:26',matches:['e5','e6']},
  {time:'10:28~10:34',matches:['a5','a6']},
  {time:'10:36~10:42',matches:['b5','b6']},
  {time:'10:44~10:50',matches:['e7','e8']},
  {time:'10:52~10:58',matches:['c5','c6']},
  {time:'11:00~11:06',matches:['d5','d6']},
  {time:'11:08~11:14',matches:['e9','e10']},
];

// matchIdからグループと試合情報を引く
var matchMap={};
for(var g in GROUPS){
  GROUPS[g].matches.forEach(function(m){
    matchMap[m.id]={grp:g, match:m};
  });
}

var SCHED=[
  {slot:1,time:'11:30~11:36',A:'Z1',B:'Z2'},{slot:2,time:'11:38~11:44',A:'Y1',B:'X1'},
  {slot:3,time:'11:46~11:52',A:'W1',B:'Z3'},{slot:4,time:'11:54~12:00',A:'Z4',B:'Y2'},
  {slot:5,time:'12:02~12:08',A:'Y3',B:'X2'},{slot:6,time:'12:10~12:16',A:'X3',B:'W2'},
  {slot:7,time:'12:18~12:24',A:'W3',B:'Z5'},{slot:8,time:'12:26~12:32',A:'Y4',B:'X4'},
  {slot:9,time:'12:34~12:41',A:'W4',B:null}
];
var TM_SRC={
  W1:[['b',1],['c',1]],W2:[['a',1],null],W3:[['d',1],['e',1]],W4:[null,null],
  X1:[['b',2],['c',2]],X2:[['a',2],null],X3:[['d',2],['e',2]],X4:[null,null],
  Y1:[['b',3],['c',3]],Y2:[['a',3],null],Y3:[['d',3],['e',3]],Y4:[null,null],
  Z1:[['a',4],['b',4]],Z2:[['c',4],['d',4]],Z3:[['e',4],null],Z4:[['e',5],null],Z5:[null,null]
};
var TM_WREF={
  W2:[null,'W1'],W4:['W2','W3'],X2:[null,'X1'],X4:['X2','X3'],
  Y2:[null,'Y1'],Y4:['Y2','Y3'],Z3:[null,'Z1'],Z4:[null,'Z2'],Z5:['Z3','Z4']
};
var BLK_PTS={W:{1:250,2:200,other:150},X:{1:150,2:120,other:100},Y:{1:100,2:80,other:75},Z:{1:75,2:50,other:30}};
var BLK_FINALS={
  W:{final:'W4',semi:['W2','W3'],first:['W1']},X:{final:'X4',semi:['X2','X3'],first:['X1']},
  Y:{final:'Y4',semi:['Y2','Y3'],first:['Y1']},Z:{final:'Z5',semi:['Z3','Z4'],first:['Z1','Z2']}
};

var scores={},winners={},rankings={};

setStat('wait','接続中...');
db.ref('handball').on('value',function(snap){
  if(window._lc)return;
  var d=snap.val()||{};
  scores=d.scores||{};winners=d.winners||{};
  setStat('ok',READ_ONLY?'閲覧中':'同期中');
  calcRankings();renderAll();
  if(!READ_ONLY){
    document.getElementById('reset-area').innerHTML='<button onclick="resetAllData()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer">🗑 リセット</button>';
  }
},function(){setStat('','エラー');});

function sync(){
  if(READ_ONLY)return;
  setStat('wait','保存中...');
  db.ref('handball').set({scores:scores,winners:winners},function(err){
    setStat(err?'':'ok',err?'エラー':'同期中');
    window._lc=false;
  });
}

function calcRankings(){
  rankings={};
  for(var g in GROUPS){
    var gd=GROUPS[g],st={};
    gd.teams.forEach(function(t){st[t]={pts:0,gd:0,gf:0,w:0,d:0,l:0};});
    gd.matches.forEach(function(m){
      var s=scores[m.id];if(!s||s.h==null||s.a==null)return;
      var h=+s.h,a=+s.a;
      st[m.h].gf+=h;st[m.a].gf+=a;st[m.h].gd+=h-a;st[m.a].gd+=a-h;
      if(h>a){st[m.h].pts+=3;st[m.h].w++;st[m.a].l++;}
      else if(h<a){st[m.a].pts+=3;st[m.a].w++;st[m.h].l++;}
      else{st[m.h].pts++;st[m.h].d++;st[m.a].pts++;st[m.a].d++;}
    });
    // statsも保存
    GROUPS[g]._st=st;
    rankings[g]=gd.teams.slice().sort(function(a,b){
      return st[b].pts-st[a].pts||st[b].gd-st[a].gd||st[b].gf-st[a].gf;
    });
  }
}

function resolveTeam(mid){
  var srcs=TM_SRC[mid]||[],wrefs=TM_WREF[mid]||[],teams=[];
  for(var i=0;i<2;i++){
    var src=srcs[i],wref=wrefs[i];
    if(src&&src[0]){var r=rankings[src[0]];teams.push(r&&r[src[1]-1]||'');}
    else if(wref&&winners[wref])teams.push(winners[wref]);
    else teams.push('');
  }
  return teams;
}

function getLoser(mid){
  var win=winners[mid];if(!win)return null;
  var t=resolveTeam(mid);
  if(t[0]===win)return t[1]||null;if(t[1]===win)return t[0]||null;return null;
}

function calcTotalRanking(){
  var allCls={};
  for(var g in GROUPS) GROUPS[g].teams.forEach(function(t){allCls[t]={cls:t,pts:0,blkRank:0,details:[]};});
  for(var blk in BLK_FINALS){
    var bf=BLK_FINALS[blk],bpts=BLK_PTS[blk];
    var fw=winners[bf.final],fl=getLoser(bf.final);
    if(fw&&allCls[fw]){allCls[fw].pts+=bpts[1];allCls[fw].blkRank=1;allCls[fw].details.push(blk+'1位('+bpts[1]+'点)');}
    if(fl&&allCls[fl]){allCls[fl].pts+=bpts[2];allCls[fl].blkRank=2;allCls[fl].details.push(blk+'2位('+bpts[2]+'点)');}
    bf.semi.forEach(function(mid){var l=getLoser(mid);if(l&&allCls[l]&&!allCls[l].blkRank){allCls[l].pts+=bpts.other;allCls[l].blkRank=3;allCls[l].details.push(blk+'3-4位('+bpts.other+'点)');}});
    bf.first.forEach(function(mid){var l=getLoser(mid);if(l&&allCls[l]&&!allCls[l].blkRank){allCls[l].pts+=bpts.other;allCls[l].blkRank=5;allCls[l].details.push(blk+'5位('+bpts.other+'点)');}});
  }
  return Object.values(allCls).sort(function(a,b){return b.pts-a.pts;});
}

function renderAll(){renderGroup();renderMatrix();renderRank();renderTour();renderShift();renderTotal();}

// ===== 得点入力（時間割順）=====
function renderGroup(){
  var ro=READ_ONLY;
  var msg=ro?'📺 閲覧専用 — 試合結果をリアルタイムで確認できます':'⏱ 時間割の順番に得点を入力してください';
  var html='<div class="info">'+msg+'</div>';

  GROUP_SCHED.forEach(function(slot,si){
    html+='<div class="card">';
    html+='<div style="font-size:11px;color:#888;font-weight:700;margin-bottom:8px">'+slot.time+'</div>';
    slot.matches.forEach(function(mid){
      var info=matchMap[mid];if(!info)return;
      var m=info.match,gd=GROUPS[info.grp];
      var sv=scores[mid]||{};
      var hv=sv.h!=null?sv.h:'',av=sv.a!=null?sv.a:'';
      html+='<div class="match-card" style="margin-bottom:8px">';
      html+='<div class="match-header">';
      html+='<span class="match-grp badge '+gd.cls+'">'+gd.name+'</span>';
      html+='<span style="font-size:10px;color:#aaa">'+mid+'</span>';
      html+='</div>';
      html+='<div class="match-body">';
      html+='<div class="match-team">'+m.h+'</div>';
      if(ro){
        html+='<div class="match-score">';
        html+='<div class="score-disp">'+(hv!==''?hv:'—')+'</div>';
        html+='<div class="match-vs">vs</div>';
        html+='<div class="score-disp">'+(av!==''?av:'—')+'</div>';
        html+='</div>';
      } else {
        html+='<div class="match-score">';
        html+='<input type="number" min="0" max="99" value="'+hv+'" onchange="setScore(\''+mid+'\',\'h\',this.value)">';
        html+='<div class="match-vs">vs</div>';
        html+='<input type="number" min="0" max="99" value="'+av+'" onchange="setScore(\''+mid+'\',\'a\',this.value)">';
        html+='</div>';
      }
      html+='<div class="match-team">'+m.a+'</div>';
      html+='</div>';
      // 結果表示
      if(hv!==''&&av!==''){
        var h=+hv,a=+av;
        var res=h>a?m.h+'が勝利':h<a?m.a+'が勝利':'引き分け';
        html+='<div style="text-align:center;font-size:11px;padding:4px 0 8px;color:'+(h===a?'#854D0E':h>a?'#065F46':'#991B1B')+';font-weight:700">'+res+'</div>';
      }
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('pg-group').innerHTML=html;
}

function setScore(id,side,val){
  if(READ_ONLY)return;
  window._lc=true;
  if(!scores[id])scores[id]={h:null,a:null};
  scores[id][side]=val===''?null:parseInt(val);
  calcRankings();renderGroup();renderMatrix();renderRank();renderTour();renderShift();renderTotal();
  clearTimeout(window._st);window._st=setTimeout(sync,800);
}

// ===== 総当たり表 =====
var _matrixGrp='a';
function renderMatrix(){
  var html='<div class="info">各グループの総当たり結果を表示<span class="auto-tag">● 自動</span></div>';
  // グループ選択タブ
  html+='<div class="sub-tabs">';
  for(var g in GROUPS){
    var gd=GROUPS[g];
    html+='<button class="sub-tab'+(g===_matrixGrp?' on':'')+'" onclick="switchMatrixGrp(\''+g+'\')">'+gd.name+'</button>';
  }
  html+='</div>';
  html+='<div id="matrix-body"></div>';
  document.getElementById('pg-matrix').innerHTML=html;
  renderMatrixBody(_matrixGrp);
}

function switchMatrixGrp(g){
  _matrixGrp=g;
  document.querySelectorAll('.sub-tab').forEach(function(b){b.classList.remove('on');});
  event.target.classList.add('on');
  renderMatrixBody(g);
}

function renderMatrixBody(g){
  var gd=GROUPS[g];
  var teams=gd.teams;
  var st=gd._st||{};
  // 初期化
  if(!gd._st) teams.forEach(function(t){st[t]={pts:0,gd:0,gf:0,w:0,d:0,l:0};});

  // 対戦結果マップ
  var results={};
  teams.forEach(function(t1){
    results[t1]={};
    teams.forEach(function(t2){results[t1][t2]=null;});
  });
  gd.matches.forEach(function(m){
    var s=scores[m.id];if(!s||s.h==null||s.a==null)return;
    var h=+s.h,a=+s.a;
    results[m.h][m.a]={h:h,a:a};
    results[m.a][m.h]={h:a,a:h};
  });

  var ranked=rankings[g]||teams;

  var html='<div class="card"><div style="overflow-x:auto">';
  html+='<table class="matrix">';
  // ヘッダー
  html+='<tr><th></th>';
  teams.forEach(function(t){html+='<th>'+t+'</th>';});
  html+='<th>勝点</th><th>勝</th><th>引</th><th>負</th><th>得失</th><th style="min-width:36px">順位</th></tr>';

  teams.forEach(function(t1){
    var pos=ranked.indexOf(t1);
    var rank=pos>=0?pos+1:'—';
    var rankBadge=['r1','r2','r3','r4','r5'][pos]||'';
    html+='<tr>';
    html+='<td class="cls-h">'+t1+'</td>';
    teams.forEach(function(t2){
      if(t1===t2){html+='<td class="self"></td>';return;}
      var r=results[t1][t2];
      if(!r){html+='<td class="blank">—</td>';return;}
      var cls=r.h>r.a?'win':r.h<r.a?'lose':'draw';
      html+='<td class="'+cls+'">'+r.h+'-'+r.a+'</td>';
    });
    var s=st[t1]||{pts:0,w:0,d:0,l:0,gd:0};
    html+='<td style="font-weight:800;font-size:13px">'+s.pts+'</td>';
    html+='<td>'+s.w+'</td><td>'+s.d+'</td><td>'+s.l+'</td>';
    var gdStr=(s.gd>0?'+':'')+s.gd;
    html+='<td style="color:'+(s.gd>0?'#065F46':s.gd<0?'#991B1B':'#333')+'">'+gdStr+'</td>';
    html+='<td><span class="badge '+rankBadge+'">'+rank+'位</span></td>';
    html+='</tr>';
  });
  html+='</table></div>';
  html+='<div style="margin-top:8px;font-size:11px;color:#aaa">🟢 勝利　🔴 敗北　🟡 引き分け</div>';
  html+='</div>';

  document.getElementById('matrix-body').innerHTML=html;
}

// ===== 順位表 =====
function renderRank(){
  var rcs=['r1','r2','r3','r4','r5'];
  var html='<div class="info">得点入力で自動計算<span class="auto-tag">● 自動</span></div>';
  for(var g in GROUPS){
    var gd=GROUPS[g],ranked=rankings[g]||[];
    html+='<div class="card"><div style="margin-bottom:8px"><span class="badge '+gd.cls+'">'+gd.name+'</span></div>';
    html+='<table><tr><th>順位</th><th>クラス</th><th>勝点</th><th>勝</th><th>引</th><th>負</th><th>得失</th></tr>';
    ranked.forEach(function(t,i){
      var s=(gd._st&&gd._st[t])||{pts:0,w:0,d:0,l:0,gd:0};
      var gdStr=(s.gd>0?'+':'')+s.gd;
      html+='<tr><td><span class="badge '+rcs[i]+'">'+(i+1)+'位</span></td>';
      html+='<td class="tl"><b>'+t+'</b></td>';
      html+='<td style="font-weight:800">'+s.pts+'</td>';
      html+='<td>'+s.w+'</td><td>'+s.d+'</td><td>'+s.l+'</td>';
      html+='<td style="color:'+(s.gd>0?'#065F46':s.gd<0?'#991B1B':'#333')+'">'+gdStr+'</td></tr>';
    });
    // まだ順位が出ていないクラス
    gd.teams.forEach(function(t){
      if(ranked.indexOf(t)>=0)return;
      html+='<tr><td><span class="badge">—</span></td><td class="tl"><b>'+t+'</b></td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>';
    });
    html+='</table></div>';
  }
  document.getElementById('pg-rank').innerHTML=html;
}

// ===== トーナメント =====
function renderTour(){
  var blkCls={W:'blk-W',X:'blk-X',Y:'blk-Y',Z:'blk-Z'};
  var ro=READ_ONLY;
  var html='<div class="info">順位確定後に対戦相手が自動表示<span class="auto-tag">● 自動</span></div>';
  SCHED.forEach(function(sch){
    var mids=sch.B?[sch.A,sch.B]:[sch.A];
    html+='<div class="card"><div style="font-size:12px;color:#888;margin-bottom:6px">試合'+sch.slot+'　'+sch.time+'</div>';
    mids.forEach(function(mid,fi){
      var teams=resolveTeam(mid),t1=teams[0]||'—',t2=teams[1]||'—',blk=mid[0];
      html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      html+='<span class="badge '+blkCls[blk]+'">'+mid+'</span>';
      html+='<span style="font-size:11px;color:#888">'+(fi===0?'A面':'B面')+'</span>';
      html+='<span style="font-weight:700;font-size:13px">'+t1+' vs '+t2+'</span></div>';
      if(ro){
        var w=winners[mid]||'';
        html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:#555">';
        html+='<span>勝者:</span><span style="font-weight:800;color:'+(w?'#065F46':'#aaa')+'">'+(w||'未入力')+'</span></div>';
      } else {
        var winVal=winners[mid]||'';
        html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
        html+='<span style="font-size:11px;color:#666">勝者:</span>';
        html+='<input class="winner-input" placeholder="クラス名" value="'+winVal+'" onchange="setWinner(\''+mid+'\',this.value)">';
        html+='</div>';
      }
    });
    html+='</div>';
  });
  document.getElementById('pg-tour').innerHTML=html;
}

function setWinner(mid,val){
  if(READ_ONLY)return;
  window._lc=true;winners[mid]=val.trim();
  renderTour();renderShift();renderTotal();
  clearTimeout(window._st);window._st=setTimeout(sync,800);
}

// ===== 審判シフト =====
function renderShift(){
  var POOL=ALL_STAFF.slice();
  var refCnt={},subCnt={},yudoCnt={},honCnt={};
  ALL_STAFF.forEach(function(s){refCnt[s.name]=0;subCnt[s.name]=0;yudoCnt[s.name]=0;honCnt[s.name]=0;});
  var blkCls={W:'blk-W',X:'blk-X',Y:'blk-Y',Z:'blk-Z'};
  var html='<div class="info">出場クラスを除外・自動割り当て<span class="auto-tag">● 自動</span></div>';
  html+='<div class="info" style="margin-top:4px">ハンドボール: 各コート主審1・副審1、共通で誘導1・本部1（計6人）</div>';
  SCHED.forEach(function(sch){
    var mids=sch.B?[sch.A,sch.B]:[sch.A];
    var playingSet={};
    mids.forEach(function(mid){resolveTeam(mid).forEach(function(c){if(c)playingSet[c]=1;});});
    var avail=POOL.filter(function(s){return !playingSet[s.cls];});
    var usedNames={};
    function pick(cnt){
      var c=avail.filter(function(s){return !usedNames[s.name];});
      c.sort(function(a,b){return cnt[a.name]-cnt[b.name];});
      var ch=c[0]||null;if(ch){cnt[ch.name]++;usedNames[ch.name]=true;}return ch;
    }
    var matchResults=[];
    mids.forEach(function(mid){
      var teams=resolveTeam(mid),t1=teams[0]||'未確定',t2=teams[1]||'未確定';
      var ref=pick(refCnt),sub=pick(subCnt);
      matchResults.push({mid:mid,t1:t1,t2:t2,ref:ref,sub:sub});
    });
    var yudo=pick(yudoCnt),hon=pick(honCnt);
    html+='<div class="shift-row">';
    html+='<div style="font-size:12px;color:#888;margin-bottom:6px">試合'+sch.slot+'　'+sch.time+'</div>';
    matchResults.forEach(function(mr,fi){
      var blk=mr.mid[0];
      html+='<div style="margin-bottom:8px">';
      html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      html+='<span class="badge '+blkCls[blk]+'" style="font-size:11px">'+mr.mid+'</span>';
      html+='<span style="font-size:11px;color:#888">'+(fi===0?'A面':'B面')+'</span>';
      html+='<span style="font-weight:700;font-size:13px">'+mr.t1+' vs '+mr.t2+'</span></div>';
      html+='<div class="roles">';
      html+='<div class="role-box '+(mr.ref?'ref-box':'ng-box')+'"><div class="role-lbl">主審</div><div class="role-name">'+(mr.ref?mr.ref.cls+' '+mr.ref.name:'不足')+'</div></div>';
      html+='<div class="role-box '+(mr.sub?'bb-box':'ng-box')+'"><div class="role-lbl">副審</div><div class="role-name">'+(mr.sub?mr.sub.cls+' '+mr.sub.name:'不足')+'</div></div>';
      html+='</div></div>';
    });
    html+='<div class="honbu-row">';
    html+='<div class="role-box pk-box"><div class="role-lbl">誘導</div><div class="role-name">'+(yudo?yudo.cls+' '+yudo.name:'不足')+'</div></div>';
    html+='<div class="role-box hb-box"><div class="role-lbl">本部</div><div class="role-name">'+(hon?hon.cls+' '+hon.name:'不足')+'</div></div>';
    html+='</div></div>';
  });
  document.getElementById('pg-shift').innerHTML=html;
}

// ===== 総合順位 =====
function renderTotal(){
  var list=calcTotalRanking();
  var medals=['🥇','🥈','🥉'];
  var rankCls=['rank-gold','rank-silver','rank-bronze'];
  var html='<div class="info">トーナメント結果から自動計算<span class="auto-tag">● 自動</span></div>';
  html+='<div class="card"><div style="font-weight:700;font-size:13px;margin-bottom:8px">得点表</div>';
  html+='<table class="pts-table"><tr><th>ブロック</th><th>1位</th><th>2位</th><th>3〜5位</th></tr>';
  html+='<tr><td><span class="badge blk-W">W</span></td><td>250点</td><td>200点</td><td>150点</td></tr>';
  html+='<tr><td><span class="badge blk-X">X</span></td><td>150点</td><td>120点</td><td>100点</td></tr>';
  html+='<tr><td><span class="badge blk-Y">Y</span></td><td>100点</td><td>80点</td><td>75点</td></tr>';
  html+='<tr><td><span class="badge blk-Z">Z</span></td><td>75点</td><td>50点</td><td>30点</td></tr>';
  html+='</table></div>';
  html+='<div class="card"><div style="font-weight:700;font-size:13px;margin-bottom:10px">総合順位</div>';
  var prevPts=-1,dispRank=0,cnt=0;
  list.forEach(function(item){
    cnt++;if(item.pts!==prevPts){dispRank=cnt;prevPts=item.pts;}
    var rc=dispRank<=3?rankCls[dispRank-1]:'';
    var medal=dispRank<=3?medals[dispRank-1]:'';
    html+='<div class="rank-row '+(rc||'')+'">';
    html+='<div class="rank-num">'+(medal||dispRank)+'</div>';
    html+='<div><div class="rank-cls">'+item.cls+'</div>';
    html+='<div class="rank-detail">'+(item.details.length?item.details.join(' '):'トーナメント未入力')+'</div></div>';
    html+='<div class="rank-pts">'+(item.pts>0?item.pts+'点':'—')+'</div></div>';
  });
  html+='</div>';
  document.getElementById('pg-total').innerHTML=html;
}

function showTab(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='matrix') renderMatrix();
}

calcRankings();renderAll();

function resetAllData(){
  if(!confirm('⚠️ 全データ（得点・勝者）をリセットしますか？\nこの操作は取り消せません。')) return;
  scores={};winners={};
  calcRankings();renderAll();
  sync();
}
