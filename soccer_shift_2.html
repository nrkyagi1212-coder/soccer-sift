<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サッカー審判シフト</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:14px;background:#f4f5f7;color:#111}
header{background:#185FA5;color:#fff;padding:14px 16px;font-size:16px;font-weight:700;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sync-dot.ok{background:#4ade80}
.sync-dot.wait{background:#facc15;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:#fff;border-bottom:2px solid #185FA5;overflow-x:auto;position:sticky;top:50px;z-index:99}
.tab{flex:1;min-width:70px;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap}
.tab.on{color:#185FA5;border-bottom:2px solid #185FA5;margin-bottom:-2px}
.page{display:none;padding:12px}
.page.on{display:block}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h3{font-size:13px;font-weight:700;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#444;color:#fff;padding:6px 4px;text-align:center;font-size:11px}
td{padding:6px 4px;border-bottom:1px solid #eee;text-align:center}
td.tl{text-align:left}
input[type=number]{width:44px;padding:4px 2px;text-align:center;border:2px solid #FFDD00;border-radius:6px;font-size:15px;font-weight:700;background:#FFFFF0}
input[type=number]:focus{outline:none;border-color:#185FA5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.r1{background:#E6F1FB;color:#0C447C}.r2{background:#EAF3DE;color:#27500A}
.r3{background:#FAEEDA;color:#633806}.r4{background:#FAECE7;color:#712B13}.r5{background:#F1EFE8;color:#444}
.grp-a{background:#185FA5;color:#fff}.grp-b{background:#1D9E75;color:#fff}
.grp-c{background:#993C1D;color:#fff}.grp-d{background:#534AB7;color:#fff}.grp-e{background:#444441;color:#fff}
.blk-W{background:#E6F1FB;color:#0C447C}.blk-X{background:#E1F5EE;color:#085041}
.blk-Y{background:#FAECE7;color:#712B13}.blk-Z{background:#EEEDFE;color:#3C3489}
.shift-row{border-radius:8px;padding:8px 10px;margin-bottom:6px;border:1px solid #e8e8e8;background:#fff}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px}
.role-box{border-radius:6px;padding:4px 7px;font-size:11px}
.role-lbl{font-size:10px;opacity:.7;margin-bottom:1px}
.role-name{font-weight:700;font-size:12px}
.honbu-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px;padding-top:6px;border-top:1px solid #eee}
.ref-box{background:#E6F1FB;color:#0C447C}.bb-box{background:#E1F5EE;color:#085041}
.hb-box{background:#FAEEDA;color:#633806}.pk-box{background:#FBEAF0;color:#72243E}
.ng-box{background:#FCEBEB;color:#A32D2D}
.info{background:#E6F1FB;color:#0C447C;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:8px;line-height:1.6}
.winner-input{width:80px;padding:4px 6px;border:2px solid #FFDD00;border-radius:6px;font-size:13px;font-weight:700;text-align:center;background:#FFFFF0}
.auto-tag{font-size:10px;color:#1D9E75;font-weight:600;margin-left:4px}
</style>
</head>
<body>

<header>
  ⚽ サッカー審判シフト
  <span style="font-size:12px;font-weight:400"><span class="sync-dot" id="dot"></span><span id="sstat">接続中...</span></span>
</header>

<div class="tabs">
  <button class="tab on" onclick="showTab('group',this)">グループ戦</button>
  <button class="tab" onclick="showTab('rank',this)">順位表</button>
  <button class="tab" onclick="showTab('tour',this)">トーナメント</button>
  <button class="tab" onclick="showTab('shift',this)">審判シフト</button>
</div>

<div id="pg-group" class="page on"></div>
<div id="pg-rank"  class="page"></div>
<div id="pg-tour"  class="page"></div>
<div id="pg-shift" class="page"></div>

<script>
// ===== Firebase =====
firebase.initializeApp({
  databaseURL: 'https://taizitu-sift-default-rtdb.firebaseio.com'
});
var db = firebase.database();

function setStat(state, msg) {
  var dot = document.getElementById('dot');
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  document.getElementById('sstat').textContent = msg;
}

// ===== データ定義 =====
var HONBU  = {cls:'5C', name:'大友翔'};
var PK_TAN = {cls:'4E', name:'矢木誠人'};
var ALL_STAFF = [
  {cls:'5C',name:'大友翔'},{cls:'5E',name:'横瀬智哉'},{cls:'5D',name:'角川健太郎'},
  {cls:'5B',name:'平田詩'},{cls:'5A',name:'松江日向'},{cls:'4E',name:'矢木誠人'},
  {cls:'4G',name:'藤代真平'},{cls:'4D',name:'秋野蒼介'},{cls:'4C',name:'小林岳'},
  {cls:'4D',name:'佐久間貴大'},{cls:'4B',name:'孫家熙'},{cls:'4B',name:'高橋央佑'}
];
var GROUPS = {
  a:{name:'aグループ',cls:'grp-a',teams:['4D','4E','5G','6B'],
     matches:[{id:'a1',h:'4D',a:'4E'},{id:'a2',h:'5G',a:'6B'},{id:'a3',h:'4D',a:'5G'},
              {id:'a4',h:'4E',a:'6B'},{id:'a5',h:'4D',a:'6B'},{id:'a6',h:'4E',a:'5G'}]},
  b:{name:'bグループ',cls:'grp-b',teams:['4F','5A','5D','6C'],
     matches:[{id:'b1',h:'4F',a:'5A'},{id:'b2',h:'5D',a:'6C'},{id:'b3',h:'4F',a:'5D'},
              {id:'b4',h:'5A',a:'6C'},{id:'b5',h:'4F',a:'6C'},{id:'b6',h:'5A',a:'5D'}]},
  c:{name:'cグループ',cls:'grp-c',teams:['4B','4G','6A','6F'],
     matches:[{id:'c1',h:'4B',a:'4G'},{id:'c2',h:'6A',a:'6F'},{id:'c3',h:'4B',a:'6A'},
              {id:'c4',h:'4G',a:'6F'},{id:'c5',h:'4B',a:'6F'},{id:'c6',h:'4G',a:'6A'}]},
  d:{name:'dグループ',cls:'grp-d',teams:['4C','5B','5F','6E'],
     matches:[{id:'d1',h:'4C',a:'5B'},{id:'d2',h:'5F',a:'6E'},{id:'d3',h:'4C',a:'5F'},
              {id:'d4',h:'5B',a:'6E'},{id:'d5',h:'4C',a:'6E'},{id:'d6',h:'5B',a:'5F'}]},
  e:{name:'eグループ',cls:'grp-e',teams:['4A','5C','5E','6G','6D'],
     matches:[{id:'e1',h:'4A',a:'5C'},{id:'e2',h:'5E',a:'6G'},{id:'e3',h:'4A',a:'6D'},
              {id:'e4',h:'5C',a:'5E'},{id:'e5',h:'6G',a:'6D'},{id:'e6',h:'4A',a:'5E'},
              {id:'e7',h:'5C',a:'6G'},{id:'e8',h:'5E',a:'6D'},{id:'e9',h:'4A',a:'6G'},
              {id:'e10',h:'5C',a:'6D'}]}
};
var SCHED=[
  {slot:1,time:'11:30~11:36',A:'Z1',B:'Z2'},{slot:2,time:'11:38~11:44',A:'Y1',B:'X1'},
  {slot:3,time:'11:46~11:52',A:'W1',B:'Z3'},{slot:4,time:'11:54~12:00',A:'Z4',B:'Y2'},
  {slot:5,time:'12:02~12:08',A:'Y3',B:'X2'},{slot:6,time:'12:10~12:16',A:'X3',B:'W2'},
  {slot:7,time:'12:18~12:24',A:'W3',B:'Z5'},{slot:8,time:'12:26~12:32',A:'Y4',B:'X4'},
  {slot:9,time:'12:34~12:41',A:'W4',B:null}
];
var TM_SRC={
  W1:[['b',1],['c',1]],W2:[['a',1],null],W3:[['d',1],['e',1]],W4:[null,null],
  X1:[['b',2],['c',2]],X2:[['a',2],null],X3:[['d',2],['e',2]],X4:[null,null],
  Y1:[['b',3],['c',3]],Y2:[['a',3],null],Y3:[['d',3],['e',3]],Y4:[null,null],
  Z1:[['a',4],['b',4]],Z2:[['c',4],['d',4]],Z3:[['e',4],null],Z4:[['e',5],null],Z5:[null,null]
};
var TM_WREF={
  W2:['W1',null],W4:['W2','W3'],X2:['X1',null],X4:['X2','X3'],
  Y2:['Y1',null],Y4:['Y2','Y3'],Z3:['Z1',null],Z4:['Z2',null],Z5:['Z3','Z4']
};

// ===== State =====
var scores  = {};
var winners = {};
var rankings = {};
var localChange = false; // 自分の入力中はFirebase更新で上書きしない

// ===== Firebase リアルタイム同期 =====
setStat('wait', '接続中...');
db.ref('soccer').on('value', function(snap) {
  if (localChange) return; // 自分が入力中は無視
  var d = snap.val() || {};
  scores  = d.scores  || {};
  winners = d.winners || {};
  setStat('ok', '同期中');
  calcRankings();
  renderAll();
}, function(err) {
  setStat('', 'エラー');
});

function syncToFirebase() {
  setStat('wait', '保存中...');
  db.ref('soccer').set({scores: scores, winners: winners}, function(err) {
    setStat(err ? '' : 'ok', err ? 'エラー' : '同期中');
    localChange = false;
  });
}

// ===== 計算 =====
function calcRankings() {
  rankings = {};
  for (var g in GROUPS) {
    var gd = GROUPS[g];
    var st = {};
    gd.teams.forEach(function(t){ st[t]={pts:0,gd:0,gf:0}; });
    gd.matches.forEach(function(m) {
      var s = scores[m.id];
      if (!s || s.h == null || s.a == null) return;
      var h = +s.h, a = +s.a;
      st[m.h].gf += h; st[m.a].gf += a;
      st[m.h].gd += h-a; st[m.a].gd += a-h;
      if (h > a) { st[m.h].pts += 3; }
      else if (h < a) { st[m.a].pts += 3; }
      else { st[m.h].pts++; st[m.a].pts++; }
    });
    rankings[g] = gd.teams.slice().sort(function(a,b){
      return st[b].pts-st[a].pts || st[b].gd-st[a].gd || st[b].gf-st[a].gf;
    });
  }
}

function resolveTeam(mid) {
  var srcs  = TM_SRC[mid]  || [];
  var wrefs = TM_WREF[mid] || [];
  var teams = [];
  for (var i = 0; i < 2; i++) {
    var src = srcs[i], wref = wrefs[i];
    if (src && src[0]) {
      var r = rankings[src[0]];
      teams.push(r && r[src[1]-1] || '');
    } else if (wref && winners[wref]) {
      teams.push(winners[wref]);
    } else {
      teams.push('');
    }
  }
  return teams;
}

// ===== 全体再描画 =====
function renderAll() {
  renderGroup();
  renderRank();
  renderTour();
  renderShift();
}

// ===== グループ戦 =====
function renderGroup() {
  var html = '<div class="info">黄色の欄に得点を入力 → 全員のスマホに自動同期されます</div>';
  for (var g in GROUPS) {
    var gd = GROUPS[g];
    html += '<div class="card"><h3><span class="badge ' + gd.cls + '">' + gd.name + '</span></h3>';
    html += '<table><tr><th>No.</th><th>ホーム</th><th>得点</th><th></th><th>得点</th><th>アウェー</th></tr>';
    gd.matches.forEach(function(m) {
      var sv = scores[m.id] || {};
      var hv = sv.h != null ? sv.h : '';
      var av = sv.a != null ? sv.a : '';
      html += '<tr><td><b style="font-size:11px">' + m.id + '</b></td>';
      html += '<td class="tl"><b>' + m.h + '</b></td>';
      html += '<td><input type="number" min="0" max="99" value="' + hv + '" oninput="setScore(\'' + m.id + '\',\'h\',this.value)"></td>';
      html += '<td style="color:#aaa;font-size:11px">vs</td>';
      html += '<td><input type="number" min="0" max="99" value="' + av + '" oninput="setScore(\'' + m.id + '\',\'a\',this.value)"></td>';
      html += '<td class="tl"><b>' + m.a + '</b></td></tr>';
    });
    html += '</table></div>';
  }
  document.getElementById('pg-group').innerHTML = html;
}

function setScore(id, side, val) {
  localChange = true;
  if (!scores[id]) scores[id] = {h:null, a:null};
  scores[id][side] = val === '' ? null : parseInt(val);
  calcRankings();
  renderRank();
  renderTour();
  renderShift();
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(syncToFirebase, 800);
}

// ===== 順位表 =====
function renderRank() {
  var rcs = ['r1','r2','r3','r4','r5'];
  var html = '<div class="info">得点入力で自動計算<span class="auto-tag">● 自動</span></div>';
  for (var g in GROUPS) {
    var gd = GROUPS[g];
    var ranked = rankings[g] || [];
    html += '<div class="card"><h3><span class="badge ' + gd.cls + '">' + gd.name + '</span></h3>';
    html += '<table><tr><th>順位</th><th>クラス</th></tr>';
    gd.teams.forEach(function(t) {
      var pos = ranked.indexOf(t);
      var rc = pos >= 0 ? rcs[pos] : '';
      html += '<tr><td><span class="badge ' + rc + '">' + (pos >= 0 ? pos+1+'位' : '—') + '</span></td>';
      html += '<td class="tl"><b>' + t + '</b></td></tr>';
    });
    html += '</table></div>';
  }
  document.getElementById('pg-rank').innerHTML = html;
}

// ===== トーナメント =====
function renderTour() {
  var blkCls = {W:'blk-W',X:'blk-X',Y:'blk-Y',Z:'blk-Z'};
  var html = '<div class="info">順位確定後に対戦相手が自動表示<span class="auto-tag">● 自動</span></div>';
  SCHED.forEach(function(sch) {
    var mids = sch.B ? [sch.A, sch.B] : [sch.A];
    html += '<div class="card"><div style="font-size:12px;color:#888;margin-bottom:6px">試合' + sch.slot + '　' + sch.time + '</div>';
    mids.forEach(function(mid, fi) {
      var teams = resolveTeam(mid);
      var t1 = teams[0] || '—', t2 = teams[1] || '—';
      var blk = mid[0];
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      html += '<span class="badge ' + blkCls[blk] + '">' + mid + '</span>';
      html += '<span style="font-size:11px;color:#888">' + (fi===0?'A面':'B面') + '</span>';
      html += '<span style="font-weight:700;font-size:13px">' + t1 + ' vs ' + t2 + '</span></div>';
      var winVal = winners[mid] || '';
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
      html += '<span style="font-size:11px;color:#666">勝者:</span>';
      html += '<input class="winner-input" placeholder="クラス名" value="' + winVal + '" oninput="setWinner(\'' + mid + '\',this.value)">';
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('pg-tour').innerHTML = html;
}

function setWinner(mid, val) {
  localChange = true;
  winners[mid] = val.trim();
  renderTour();
  renderShift();
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(syncToFirebase, 800);
}

// ===== 審判シフト =====
function renderShift() {
  var POOL = ALL_STAFF.filter(function(s){ return s.name !== HONBU.name && s.name !== PK_TAN.name; });
  var refCnt = {}, bbCnt = {};
  ALL_STAFF.forEach(function(s){ refCnt[s.name]=0; bbCnt[s.name]=0; });
  var blkCls = {W:'blk-W',X:'blk-X',Y:'blk-Y',Z:'blk-Z'};
  var html = '<div class="info">出場クラスを除外・同時間帯4役全員別人で自動割り当て<span class="auto-tag">● 自動</span></div>';

  SCHED.forEach(function(sch) {
    var mids = sch.B ? [sch.A, sch.B] : [sch.A];
    var playingSet = {};
    mids.forEach(function(mid) {
      resolveTeam(mid).forEach(function(c){ if(c) playingSet[c]=1; });
    });
    var avail = POOL.filter(function(s){ return !playingSet[s.cls]; });
    var usedNames = {};
    var matchResults = [];

    mids.forEach(function(mid) {
      var teams = resolveTeam(mid);
      var t1 = teams[0]||'未確定', t2 = teams[1]||'未確定';
      var rc = avail.filter(function(s){ return !usedNames[s.name]; });
      rc.sort(function(a,b){ return refCnt[a.name]-refCnt[b.name]; });
      var ref = rc[0]||null;
      if (ref){ refCnt[ref.name]++; usedNames[ref.name]=true; }
      var bc = avail.filter(function(s){ return !usedNames[s.name]; });
      bc.sort(function(a,b){ return bbCnt[a.name]-bbCnt[b.name]; });
      var bb = bc[0]||null;
      if (bb){ bbCnt[bb.name]++; usedNames[bb.name]=true; }
      matchResults.push({mid:mid, t1:t1, t2:t2, ref:ref, bb:bb});
    });

    html += '<div class="shift-row">';
    html += '<div style="font-size:12px;color:#888;margin-bottom:6px">試合' + sch.slot + '　' + sch.time + '</div>';
    matchResults.forEach(function(mr, fi) {
      var blk = mr.mid[0];
      html += '<div style="margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      html += '<span class="badge ' + blkCls[blk] + '" style="font-size:11px">' + mr.mid + '</span>';
      html += '<span style="font-size:11px;color:#888">' + (fi===0?'A面':'B面') + '</span>';
      html += '<span style="font-weight:700;font-size:13px">' + mr.t1 + ' vs ' + mr.t2 + '</span></div>';
      html += '<div class="roles">';
      html += '<div class="role-box ' + (mr.ref?'ref-box':'ng-box') + '">';
      html += '<div class="role-lbl">審判</div>';
      html += '<div class="role-name">' + (mr.ref ? mr.ref.cls+' '+mr.ref.name : '不足') + '</div></div>';
      html += '<div class="role-box ' + (mr.bb?'bb-box':'ng-box') + '">';
      html += '<div class="role-lbl">ボールボーイ</div>';
      html += '<div class="role-name">' + (mr.bb ? mr.bb.cls+' '+mr.bb.name : '不足') + '</div></div>';
      html += '</div></div>';
    });
    html += '<div class="honbu-row">';
    html += '<div class="role-box hb-box"><div class="role-lbl">本部（全試合）</div><div class="role-name">' + HONBU.cls + ' ' + HONBU.name + '</div></div>';
    html += '<div class="role-box pk-box"><div class="role-lbl">PK担当（全試合）</div><div class="role-name">' + PK_TAN.cls + ' ' + PK_TAN.name + '</div></div>';
    html += '</div></div>';
  });

  document.getElementById('pg-shift').innerHTML = html;
}

// ===== タブ =====
function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
}

// ===== 初期描画（Firebase接続前に一旦表示） =====
calcRankings();
renderAll();
</script>
</body>
</html>
