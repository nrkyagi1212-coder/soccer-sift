<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;font-size:13px;background:#f4f5f7;color:#111}
header{background:#111827;color:#fff;padding:12px 16px;font-size:16px;font-weight:700;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.dot{width:8px;height:8px;border-radius:50%;background:#6b7280;display:inline-block;margin-right:4px}
.dot.ok{background:#4ade80}.dot.wait{background:#facc15;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:#fff;border-bottom:2px solid #111827;position:sticky;top:48px;z-index:99;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:10px 4px;text-align:center;font-size:11px;font-weight:700;color:#888;border:none;background:none;cursor:pointer;white-space:nowrap}
.tab.on{color:#111827;border-bottom:3px solid #111827;margin-bottom:-2px}
.page{display:none;padding:10px}.page.on{display:block}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.info{background:#F3F4F6;color:#374151;border-radius:8px;padding:8px 12px;font-size:11px;margin-bottom:8px;line-height:1.6}
.auto-tag{font-size:10px;color:#1D9E75;font-weight:600;margin-left:4px}

/* 得点表 */
.score-section{margin-bottom:14px}
.grade-header{font-size:13px;font-weight:800;padding:6px 10px;border-radius:8px 8px 0 0;color:#fff}
.g4h{background:#185FA5}.g5h{background:#1D9E75}.g6h{background:#BA7517}
.score-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.st{border-collapse:collapse;font-size:11px;min-width:100%}
table.st th{padding:5px 6px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid #ddd}
table.st td{padding:5px 6px;text-align:center;border:1px solid #ddd;white-space:nowrap}
.th-sport{background:#444;color:#fff;text-align:left!important;min-width:80px}
.th-cls{background:#E8F4FD;color:#0C447C;font-weight:800;font-size:12px}
.td-pts{font-weight:700;font-size:12px}
.td-blank{color:#ccc;font-size:10px}
tr.tr-subtotal td{background:#F3F4F6;font-weight:700;border-top:2px solid #aaa}
tr.tr-total td{background:#111827;color:#fff;font-weight:800;font-size:13px;border-top:2px solid #111827}

/* 学年別 */
.grade-card{border-radius:10px;padding:12px;margin-bottom:10px}
.g4c{background:#EEF6FF;border-left:4px solid #185FA5}
.g5c{background:#EDFBF3;border-left:4px solid #1D9E75}
.g6c{background:#FFF7ED;border-left:4px solid #BA7517}
.grade-title{font-weight:800;font-size:14px;margin-bottom:8px}
.cls-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.07)}
.cls-name{font-weight:700;font-size:15px}
.cls-total{font-weight:800;font-size:18px}
.cls-detail{font-size:10px;color:#888;margin-top:2px}
.sp-badge{display:inline-block;padding:1px 5px;border-radius:6px;font-size:10px;font-weight:700;margin:1px}
.sp-s{background:#E6F1FB;color:#0C447C}.sp-b{background:#FAECE7;color:#712B13}
.sp-db{background:#EDFBF3;color:#085041}.sp-dbee{background:#EEEDFE;color:#3C3489}
.sp-h{background:#FAEEDA;color:#633806}

/* 組別ランキング */
.grp-rank-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;margin-bottom:6px}
.grp-rank-num{font-size:24px;font-weight:900;min-width:44px;text-align:center}
.grp-rank-name{font-size:22px;font-weight:900}
.grp-rank-pts{font-size:16px;font-weight:800;color:#111827;margin-left:auto}
.grp-rank-detail{font-size:11px;color:#888;margin-top:2px}
.grk-gold{background:#FFFBEB;border-left:5px solid #F59E0B}
.grk-silver{background:#F5F5F5;border-left:5px solid #9CA3AF}
.grk-bronze{background:#FFF3EE;border-left:5px solid #CD7C54}
.grk-other{background:#fff;border-left:5px solid #E5E7EB}

/* 午後競技 */
.pm-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pm-title{font-size:13px;font-weight:800;margin-bottom:10px;color:#333}
.rank-input-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0}
.rank-label{font-size:13px;font-weight:700;min-width:40px;color:#555}
select.rank-sel{border:2px solid #FFDD00;border-radius:6px;padding:5px 8px;font-size:14px;font-weight:700;background:#FFFFF0;flex:1}
select.rank-sel:focus{outline:none;border-color:#534AB7}
.pm-pts{font-size:12px;color:#888;min-width:50px;text-align:right}
.pm-result{background:#F3F4F6;border-radius:8px;padding:10px;margin-top:10px}
.pm-result-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #e8e8e8;font-size:13px}
.pm-cls{font-weight:700}
.pm-pts-val{font-weight:800;color:#534AB7;font-size:15px}
</style>

  {id:'taifu',    name:'台風の目',pts:{1:400,2:300,3:200,4:100,5:60}},
  {id:'tokushu4', name:'特殊走(4年)',pts:{1:130,2:100,3:70,4:40,5:20}},
  {id:'tokushu5', name:'特殊走(5年)',pts:{1:130,2:100,3:70,4:40,5:20}},

];

var fbData={};

var loaded=0;
var pmRanks={};
PM_EVENTS.forEach(function(ev){
  pmRanks[ev.id]={};
  if(ev.id==='tokushu4') CLSS.forEach(function(c){pmRanks[ev.id]['4'+c]=0;});
  else if(ev.id==='tokushu5') CLSS.forEach(function(c){pmRanks[ev.id]['5'+c]=0;});
  else if(ev.id==='tokushu6') CLSS.forEach(function(c){pmRanks[ev.id]['6'+c]=0;});
  else CLSS.forEach(function(cls){pmRanks[ev.id][cls]=0;});
});

setStat('wait','接続中...');
SPORTS.forEach(function(sport){
  db.ref(sport).on('value',function(snap){
    var d=snap.val()||{};
    fbData[sport].scores=d.scores||{};
    fbData[sport].winners=d.winners||{};
    loaded++;
    if(loaded>=SPORTS.length){setStat('ok','同期中');renderAll();}
    else if(loaded>SPORTS.length) renderAll();
  });
});

db.ref('afternoon').on('value',function(snap){
  if(window._pmLc)return;
  var d=snap.val()||{};
  PM_EVENTS.forEach(function(ev){
    if(d[ev.id]){
      var keys=Object.keys(pmRanks[ev.id]);
      keys.forEach(function(k){pmRanks[ev.id][k]=d[ev.id][k]||0;});
    }
  });
  renderAfternoon();
});

function syncPM(){
  setStat('wait','保存中...');
  db.ref('afternoon').set(pmRanks,function(err){
    setStat(err?'':'ok',err?'エラー':'同期中');
    window._pmLc=false;
  });
}
function setPMRank(evId,cls,val){
  window._pmLc=true;
  pmRanks[evId][cls]=parseInt(val)||0;
  renderAfternoon();
  clearTimeout(window._pmTimer);
  window._pmTimer=setTimeout(syncPM,800);
}
function calcPMTotal(){
  var total={};
  CLSS.forEach(function(cls){total[cls]=0;});
  PM_EVENTS.forEach(function(ev){
    // 特殊走は学年別クラスキー
    var targetCls;
    if(ev.id==='tokushu4') targetCls=CLSS.map(function(c){return '4'+c;});
    else if(ev.id==='tokushu5') targetCls=CLSS.map(function(c){return '5'+c;});
    else if(ev.id==='tokushu6') targetCls=CLSS.map(function(c){return '6'+c;});
    else targetCls=CLSS;
    targetCls.forEach(function(key){
      // A〜G組に合計する（4Aなら'A'、5Bなら'B'など最後の文字）
      var grp=key.length===2?key[1]:key; // 特殊走は'4A'形式、他は'A'形式
      var cls=grp.length===1?grp:key;
      var realCls=CLSS.indexOf(grp)>=0?grp:key;
      var rank=pmRanks[ev.id][key]||0;
      if(!total[realCls]) total[realCls]=0;
      if(rank>=1&&rank<=4) total[realCls]+=ev.pts[rank];
      else if(rank>=5) total[realCls]+=ev.pts[5];
    });
  });
  return total;
}

function calcRankings(sport){
  var groups=SPORT_GROUPS[sport],scores=fbData[sport].scores,rankings={};
  for(var g in groups){
    var gd=groups[g],st={};
    gd.teams.forEach(function(t){st[t]={pts:0,gd:0,gf:0};});
    gd.matches.forEach(function(m){
      var s=scores[m.id];if(!s||s.h==null||s.a==null)return;
      var h=+s.h,a=+s.a;
      st[m.h].gf+=h;st[m.a].gf+=a;st[m.h].gd+=h-a;st[m.a].gd+=a-h;
      if(h>a)st[m.h].pts+=3;else if(h<a)st[m.a].pts+=3;else{st[m.h].pts++;st[m.a].pts++;}
    });
    rankings[g]=gd.teams.slice().sort(function(a,b){return st[b].pts-st[a].pts||st[b].gd-st[a].gd||st[b].gf-st[a].gf;});
  }
  return rankings;
}

function calcSportPts(sport){
  var winners=fbData[sport].winners,rankings=calcRankings(sport);
  var clsPts={},clsRank={};
  var allCls=[];
  for(var g in SPORT_GROUPS[sport]) SPORT_GROUPS[sport][g].teams.forEach(function(t){if(allCls.indexOf(t)<0)allCls.push(t);});
  allCls.forEach(function(c){clsPts[c]=null;clsRank[c]=null;});
  function getTeams(mid){
    var srcs=TM_SRC[mid]||[],wrefs=TM_WREF[mid]||[],teams=[];
    for(var i=0;i<2;i++){
      var src=srcs[i],wref=wrefs[i];
      if(src&&src[0]){var r=rankings[src[0]];teams.push(r&&r[src[1]-1]||'');}
      else if(wref&&winners[wref])teams.push(winners[wref]);
      else teams.push('');
    }
    return teams;
  }
  function getLoser(mid){
    var win=winners[mid];if(!win)return null;
    var t=getTeams(mid);
    if(t[0]===win)return t[1]||null;if(t[1]===win)return t[0]||null;return null;
  }
  for(var blk in BLK_FINALS){
    var bf=BLK_FINALS[blk],bpts=BLK_PTS[blk];
    var fw=winners[bf.final],fl=getLoser(bf.final);
    if(fw&&clsPts[fw]===null){clsPts[fw]=bpts[1];clsRank[fw]=blk+'1位';}
    if(fl&&clsPts[fl]===null){clsPts[fl]=bpts[2];clsRank[fl]=blk+'2位';}
    bf.semi.forEach(function(mid){var l=getLoser(mid);if(l&&clsPts[l]===null){clsPts[l]=bpts.other;clsRank[l]=blk+'3位';}});
    bf.first.forEach(function(mid){var l=getLoser(mid);if(l&&clsPts[l]===null){clsPts[l]=bpts.other;clsRank[l]=blk+'5位';}});
  }
  return {pts:clsPts,rank:clsRank};
}

function calcAll(){
  var result={};
  GRADES.forEach(function(yr){
    CLSS.forEach(function(cls){
      var key=yr+cls;
      result[key]={total:0,sports:{}};
      SPORTS.forEach(function(sport){result[key].sports[sport]={pts:null,rank:null};});
    });
  });
  SPORTS.forEach(function(sport){
    var data=calcSportPts(sport);
    for(var cls in data.pts){
      if(result[cls]){
        result[cls].sports[sport]={pts:data.pts[cls],rank:data.rank[cls]};
        if(data.pts[cls]>0) result[cls].total+=data.pts[cls];
      }
    }
  });
  return result;
}

function renderAll(){
  if(READ_ONLY){
    document.getElementById('ro-banner').style.display='block';
    document.querySelector('header').style.background='#374151';
  }
  var data=calcAll();
  renderTable(data);
  renderGrpRank(data);
  renderGrade(data);
}

// 得点表（学年ごとに横並び）
function renderTable(data){
  var html='<div class="info">5競技のトーナメント結果から自動計算<span class="auto-tag">● 自動</span></div>';
  GRADES.forEach(function(yr){
    var grpCls='g'+yr+'h';
    var clsList=CLSS.map(function(c){return yr+c;});
    html+='<div class="score-section">';
    html+='<div class="grade-header '+grpCls+'">'+yr+'年生</div>';
    html+='<div class="score-wrap"><table class="st">';
    html+='<tr><th class="th-sport">競技</th>';
    clsList.forEach(function(cls){html+='<th class="th-cls">'+cls+'</th>';});
    html+='</tr>';
    SPORTS.forEach(function(sport){
      html+='<tr><td class="th-sport" style="color:#fff;background:#444;text-align:left;padding:4px 6px">'+SPORT_NAMES[sport]+'</td>';
      clsList.forEach(function(cls){
        var sp=data[cls].sports[sport];
        if(sp.pts!==null&&sp.pts>0){
          html+='<td class="td-pts">'+sp.pts+'</td>';
        } else {
          html+='<td class="td-blank">—</td>';
        }
      });
      html+='</tr>';
    });
    html+='<tr class="tr-subtotal"><td style="text-align:left;padding:4px 6px">合計</td>';
    clsList.forEach(function(cls){
      var t=data[cls].total;
      html+='<td>'+(t>0?t:'—')+'</td>';
    });
    html+='</tr>';
    html+='</table></div></div>';
  });
  document.getElementById('pg-table').innerHTML=html;
}

// 組別合計ランキング（A〜G組の4+5+6年合計）
function renderGrpRank(data){
  var medals=['🥇','🥈','🥉'];
  var pmTotal=calcPMTotal();
  var grpTotals={};
  CLSS.forEach(function(cls){
    grpTotals[cls]=0;
    GRADES.forEach(function(yr){grpTotals[cls]+=data[yr+cls].total||0;});
    grpTotals[cls]+=pmTotal[cls]||0;
  });
  var sorted=CLSS.slice().sort(function(a,b){return grpTotals[b]-grpTotals[a];});
  var html='<div class="info">4・5・6年の合計得点＋午後競技得点<span class="auto-tag">● 自動</span></div>';
  var prev=-1,dr=0,ct=0;
  sorted.forEach(function(cls){
    ct++;var total=grpTotals[cls];
    if(total!==prev){dr=ct;prev=total;}
    var medal=dr<=3?medals[dr-1]:dr+'位';
    var rc=dr===1?'grk-gold':dr===2?'grk-silver':dr===3?'grk-bronze':'grk-other';
    var details=GRADES.map(function(yr){return yr+'年:'+( data[yr+cls].total||0)+'点';}).join(' / ');
    details+=' / 午後:'+(pmTotal[cls]||0)+'点';
    html+='<div class="grp-rank-row '+rc+'">';
    html+='<div class="grp-rank-num">'+medal+'</div>';
    html+='<div><div class="grp-rank-name">'+cls+'組</div>';
    html+='<div class="grp-rank-detail">'+details+'</div></div>';
    html+='<div class="grp-rank-pts">'+(total>0?total+'点':'—')+'</div>';
    html+='</div>';
  });
  document.getElementById('pg-grprank').innerHTML=html;
}

// 学年別
function renderGrade(data){
  var html='<div class="info">学年ごとに合計得点でソート<span class="auto-tag">● 自動</span></div>';
  GRADES.forEach(function(yr){
    var clsList=CLSS.map(function(c){return yr+c;});
    clsList.sort(function(a,b){return data[b].total-data[a].total;});
    var gc=yr===4?'g4c':yr===5?'g5c':'g6c';
    html+='<div class="grade-card '+gc+'">';
    html+='<div class="grade-title">'+yr+'年生</div>';
    clsList.forEach(function(cls,i){
      var t=data[cls].total;
      var details=SPORTS.map(function(s){
        var sp=data[cls].sports[s];
        return sp.pts?'<span class="sp-badge '+SPORT_BADGE[s]+'">'+sp.pts+'</span>':'';
      }).join('');
      html+='<div class="cls-row">';
      html+='<div><div class="cls-name">'+(i+1)+'位　'+cls+'</div><div class="cls-detail">'+details+'</div></div>';
      html+='<div class="cls-total">'+(t>0?t+'点':'—')+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  document.getElementById('pg-grade').innerHTML=html;
}

// 午後競技
function renderAfternoon(){
  if(READ_ONLY){
    document.getElementById('ro-banner').style.display='block';
    document.querySelector('header').style.background='#374151';
  }
  var html='<div class="info">各種目の順位を入力→得点自動計算<span class="auto-tag">● 自動</span></div>';
  html+='<div class="pm-card"><div class="pm-title">午後競技 得点表</div>';
  html+='<table class="st"><tr><th class="th-sport">競技</th><th>1位</th><th>2位</th><th>3位</th><th>4位</th><th>5位〜7位</th></tr>';
  html+='<tr><td class="th-sport">綱取り・台風の目</td><td>400点</td><td>300点</td><td>200点</td><td>100点</td><td>60点</td></tr>';
  html+='<tr><td class="th-sport">特殊走（学年別）</td><td>130点</td><td>100点</td><td>70点</td><td>40点</td><td>20点</td></tr>';
  html+='<tr><td class="th-sport">選抜リレー</td><td>600点</td><td>400点</td><td>300点</td><td>200点</td><td>100点</td></tr>';
  html+='</table></div>';
  PM_EVENTS.forEach(function(ev){
    // 特殊走は対象学年のクラスのみ表示
    var targetCls;
    if(ev.id==='tokushu4') targetCls=CLSS.map(function(c){return '4'+c;});
    else if(ev.id==='tokushu5') targetCls=CLSS.map(function(c){return '5'+c;});
    else if(ev.id==='tokushu6') targetCls=CLSS.map(function(c){return '6'+c;});
    else targetCls=CLSS; // 他種目はA〜G組
    var isReadOnly=READ_ONLY;
    var gradeColor=ev.id==='tokushu4'?'#185FA5':ev.id==='tokushu5'?'#1D9E75':ev.id==='tokushu6'?'#BA7517':'#444';
    html+='<div class="pm-card"><div class="pm-title" style="display:flex;align-items:center;gap:8px">';
    html+='<span style="background:'+gradeColor+';color:#fff;padding:2px 8px;border-radius:6px;font-size:12px">'+ev.name+'</span>';
    html+='</div>';
    targetCls.forEach(function(cls){
      var cur=pmRanks[ev.id][cls]||0;
      var pts=cur>=1&&cur<=4?ev.pts[cur]:cur>=5?ev.pts[5]:0;
      html+='<div class="rank-input-row">';
      html+='<span class="rank-label">'+cls+'</span>';
      if(isReadOnly){
        html+='<span style="flex:1;font-size:14px;font-weight:700;padding:5px 8px">'+(cur>0?cur+'位':'未入力')+'</span>';
      } else {
        html+='<select class="rank-sel" onchange="setPMRank(\''+ev.id+'\',\''+cls+'\',this.value)">';
        html+='<option value="0"'+(cur===0?' selected':'')+'>---</option>';
        for(var r=1;r<=7;r++){
          var ptsVal=r<=4?ev.pts[r]:ev.pts[5];
          html+='<option value="'+r+'"'+(cur===r?' selected':'')+'>'+r+'位 ('+ptsVal+'点)</option>';
        }
        html+='</select>';
      }
      html+='<span class="pm-pts">'+(pts>0?pts+'点':'—')+'</span>';
      html+='</div>';
    });
    html+='</div>';
  });
  var total=calcPMTotal();
  var sorted=CLSS.slice().sort(function(a,b){return total[b]-total[a];});
  var medals=['🥇','🥈','🥉'];
  html+='<div class="pm-card"><div class="pm-title">🏆 午後競技 組別合計</div><div class="pm-result">';
  var prev=-1,dr=0,ct=0;
  sorted.forEach(function(cls){
    ct++;var t=total[cls];
    if(t!==prev){dr=ct;prev=t;}
    var medal=dr<=3?medals[dr-1]:dr+'位';
    html+='<div class="pm-result-row">';
    html+='<span style="font-size:16px">'+medal+'</span>';
    html+='<span class="pm-cls">'+cls+'組</span>';
    PM_EVENTS.forEach(function(ev){
      var r=pmRanks[ev.id][cls];
      var p=r>=1&&r<=4?ev.pts[r]:r>=5?ev.pts[5]:0;
      html+='<span style="font-size:10px;color:#aaa">'+ev.name.slice(0,2)+(p>0?p:'—')+'</span>';
    });
    html+='<span class="pm-pts-val">'+(t>0?t+'点':'—')+'</span>';
    html+='</div>';
  });
  html+='</div></div>';
  document.getElementById('pg-afternoon').innerHTML=html;
}

function showTab(id,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='grprank'){var data=calcAll();renderGrpRank(data);}
}

renderAfternoon();
</script>
